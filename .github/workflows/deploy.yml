name: Deploy EC2 Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          printf '%s\n' "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Create app directory on EC2
        run: |
          ssh -i key.pem -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} "mkdir -p /home/ec2-user/ec2-website-deployment"

      - name: Copy website file to EC2
        run: |
          scp -i key.pem -o StrictHostKeyChecking=no index.html ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/ec2-website-deployment/

      - name: Deploy website on EC2
        run: |
          ssh -i key.pem -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} '
            sudo cp /home/ec2-user/ec2-website-deployment/index.html /var/www/html/index.html
            sudo systemctl restart httpd
          '
